<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ResumeForge — Resume Builder</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <a href="index.html" class="logo" style="display:inline-flex;align-items:center;gap:8px;text-decoration:none;">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="#7c3aed" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0;filter:drop-shadow(0 0 6px rgba(124,58,237,0.7));">
      <path d="M13 2L4.09 12.97A1 1 0 0 0 5 14.5h6.5L10 22l9.91-9.97A1 1 0 0 0 19 11H12.5L13 2z"/>
    </svg>
    <span style="background:linear-gradient(90deg,#7c3aed,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:700;font-size:1.2rem;letter-spacing:-0.3px;">ResumeForge</span>
  </a>
  <div style="display:flex;align-items:center;gap:12px;">
    <span id="autosave-indicator" style="font-size:0.8rem;color:#64748b;"></span>
    <a href="index.html" style="color:#94a3b8;font-size:0.9rem;text-decoration:none;">← Back</a>
  </div>
</nav>

<!-- BUILDER LAYOUT -->
<div class="builder-page">

  <!-- ── FORM PANEL ── -->
  <div class="form-panel">
    <div class="form-panel-header">
      <h2>Resume Builder</h2>
      <p id="step-counter">Step 1 of 5 — Personal Info</p>
    </div>

    <div class="steps-progress" id="steps-progress">
      <div class="step-dot active" id="dot-0"></div>
      <div class="step-dot" id="dot-1"></div>
      <div class="step-dot" id="dot-2"></div>
      <div class="step-dot" id="dot-3"></div>
      <div class="step-dot" id="dot-4"></div>
    </div>

    <div class="form-content" id="form-content">
      <!-- Injected by JS -->
    </div>

    <div class="form-footer">
      <button class="form-footer button btn-back" id="btn-back" onclick="prevStep()" style="display:none;">← Back</button>
      <button class="form-footer button btn-next" id="btn-next" onclick="nextStep()">Continue →</button>
    </div>
  </div>

  <!-- ── PREVIEW PANEL ── -->
  <div class="preview-panel">
    <div class="preview-toolbar">
      <h3>📄 Live Preview</h3>
      <div class="toolbar-actions">
        <div class="template-switcher">
          <button class="tmpl-btn active" id="tmpl-modern" onclick="switchTemplate('modern')">Modern</button>
          <button class="tmpl-btn" id="tmpl-minimal" onclick="switchTemplate('minimal')">Minimal</button>
          <button class="tmpl-btn" id="tmpl-executive" onclick="switchTemplate('executive')">Executive</button>
        </div>
        <button class="download-btn" id="download-pdf-btn" onclick="downloadPDF()">⬇ Download PDF</button>
      </div>
    </div>
    <div class="preview-frame-wrap">
      <div id="resume-preview"></div>
    </div>
  </div>

</div>

<script src="js/templates.js"></script>
<script src="js/app.js"></script>
</body>
</html>
